<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1220">
  <title>TEB防災 | 地震</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/map.css">
</head>
<body data-page="earthquake">
  <aside class="sidebar" aria-label="主要メニュー">
    <a class="brand" href="./index.html"><img src="./assets/logo.png" alt="" width="36" height="36"><span>TEB防災</span></a>
    <nav class="nav">
      <a href="./index.html" data-nav="home">ホーム</a><a href="./earthquake.html" data-nav="earthquake">地震</a><a href="./weather.html" data-nav="weather">気象</a><a href="./tsunami.html" data-nav="tsunami">津波</a><a href="./typhoon.html" data-nav="typhoon">台風</a><a href="./volcano.html" data-nav="volcano">火山</a><a href="./settings.html" data-nav="settings">設定</a>
    </nav>
    <div class="sidebar-status"><span class="status-dot" id="global-status-dot"></span><span id="global-status-text">初期化中</span></div>
  </aside>
  <header class="mobile-header"><button class="icon-button" id="menu-toggle" aria-label="メニューを開く">☰</button><a class="mobile-brand" href="./index.html">TEB防災</a><span class="status-dot"></span></header>
  <main class="app-shell">
    <section class="page-header">
      <div><p class="eyebrow">Earthquake & EEW</p><h1>地震情報</h1></div>
      <div class="header-actions"><button class="button" id="notify-button">通知を有効化</button><button class="button ghost" data-refresh>更新</button></div>
    </section>
    <section class="tri-layout">
      <aside class="panel side-panel">
        <div class="panel-heading"><h2>EEW</h2><span class="badge muted" id="eew-connection-badge">未接続</span></div>
        <div id="eew-panel" class="eew-card empty-state">緊急地震速報を監視しています。</div>
        <div class="panel-heading subhead"><h2>地震一覧</h2><span id="earthquake-count" class="timestamp">0件</span></div>
        <div id="earthquake-list" class="event-list"></div>
      </aside>
      <section class="panel map-panel">
        <div id="earthquake-map" class="map full-map" aria-label="地震情報地図"></div>
      </section>
      <aside class="panel detail-panel">
        <div class="panel-heading"><h2>詳細情報</h2></div>
        <div id="earthquake-detail" class="detail-box empty-state">地震一覧から震源を選択してください。</div>
      </aside>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./js/app.js"></script><script src="./js/map.js"></script><script src="./js/eew.js"></script><script src="./js/earthquake.js"></script>
</body>
</html>
